spring:
  application:
    name: enterprise-rag-platform
  profiles:
    active: local
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB
  jackson:
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

server:
  port: 8080
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

# Swagger / OpenAPI 文档配置。
# Swagger UI: http://localhost:8080/swagger-ui.html
# OpenAPI JSON: http://localhost:8080/v3/api-docs
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

rag:
  storage:
    provider: local
    local-root: uploads
  retrieval:
    index-alias: kb_chunk_current
    top-k: 20
    min-score: 0.5
  chunk:
    max-chars: 1200
    overlap-chars: 200
  embedding:
    dimensions: 1536
  security:
    jwt-secret: ${JWT_SECRET:local-dev-secret-change-me-local-dev-secret}
    jwt-expire-minutes: 120
